<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">DrawStamp Studio 社交预览图</title>
  <desc id="desc">在线电子印章生成器，支持图片提取印章、透明 PNG 和 SVG 导出。</desc>
  <defs>
    <clipPath id="screenClip">
      <rect x="585" y="84" width="610" height="448" rx="18"/>
    </clipPath>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="48%" stop-color="#eef3f8"/>
      <stop offset="100%" stop-color="#f9fbfd"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d3162a"/>
      <stop offset="100%" stop-color="#a91e2a"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#334155" flood-opacity="0.16"/>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#1e293b" flood-opacity="0.12"/>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#d7e0eb" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)" opacity="0.42"/>
  <circle cx="1108" cy="106" r="150" fill="#f2ccd3" opacity="0.34"/>
  <circle cx="101" cy="579" r="190" fill="#dbeafe" opacity="0.46"/>

  <g transform="translate(88 88)">
    <rect x="0" y="0" width="94" height="94" rx="24" fill="#fff" stroke="#d9e2ef" filter="url(#cardShadow)"/>
    <rect x="20" y="20" width="54" height="54" rx="14" fill="#fdf1f3"/>
    <text x="47" y="58" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="34" font-weight="800" fill="#c91523">章</text>
  </g>

  <text x="88" y="229" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700" letter-spacing="1" fill="#64748b">DRAWSTAMP STUDIO</text>
  <text x="88" y="289" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="50" font-weight="850" fill="#111827">在线电子印章生成器</text>
  <text x="88" y="345" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="30" font-weight="650" fill="#334155">生成、提取、编辑、导出</text>
  <text x="88" y="396" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="500" fill="#64748b">本地处理 · 透明 PNG / SVG</text>

  <g font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="700">
    <rect x="88" y="447" width="122" height="44" rx="22" fill="#fff" stroke="#d9e2ef"/>
    <text x="149" y="476" text-anchor="middle" fill="#334155">Vue 3</text>
    <rect x="224" y="447" width="132" height="44" rx="22" fill="#fff" stroke="#d9e2ef"/>
    <text x="290" y="476" text-anchor="middle" fill="#334155">Canvas</text>
    <rect x="370" y="447" width="156" height="44" rx="22" fill="url(#red)"/>
    <text x="448" y="476" text-anchor="middle" fill="#fff">本地编辑</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="560" y="60" width="660" height="504" rx="28" fill="#ffffff" stroke="#dbe3ef"/>
    <image href="/readme-workspace.png" x="585" y="84" width="610" height="448" preserveAspectRatio="xMidYMid slice" clip-path="url(#screenClip)"/>
  </g>

  <g transform="translate(858 428)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="286" height="82" rx="18" fill="#ffffff" stroke="#e2e8f0"/>
    <circle cx="43" cy="41" r="22" fill="#fdf1f3"/>
    <text x="43" y="50" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="800" fill="#c91523">取</text>
    <text x="80" y="35" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="800" fill="#1f2937">图片提取印章</text>
    <text x="80" y="62" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="600" fill="#64748b">拖拽上传，自动生成透明 PNG</text>
  </g>

  <text x="88" y="567" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="700" fill="#c91523">wosp.cc.cd</text>
  <text x="216" y="567" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="600" fill="#64748b">github.com/fisher0627/drawstamputils</text>
</svg>
