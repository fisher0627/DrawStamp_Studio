<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">DrawStamp Studio 社交预览图</title>
  <desc id="desc">DrawStamp Studio 在线电子印章工作台，支持印章生成、图片提取、画布编辑和多格式导出。</desc>
  <defs>
    <clipPath id="screenClip">
      <rect x="592" y="88" width="594" height="430" rx="18"/>
    </clipPath>
    <linearGradient id="paperBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffaf1"/>
      <stop offset="54%" stop-color="#f6f1e7"/>
      <stop offset="100%" stop-color="#fdf8ee"/>
    </linearGradient>
    <linearGradient id="sealRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff2a36"/>
      <stop offset="50%" stop-color="#ff0015"/>
      <stop offset="100%" stop-color="#a90815"/>
    </linearGradient>
    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#18201d" flood-opacity="0.16"/>
    </filter>
    <filter id="markShadow" x="-24%" y="-24%" width="148%" height="156%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#4b0b10" flood-opacity="0.2"/>
    </filter>
    <pattern id="microGrid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#d9d3c7" stroke-width="1"/>
    </pattern>
    <pattern id="dotGrid" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#cfc7b8"/>
    </pattern>
    <pattern id="sealGrain" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="1.6" cy="1.4" r="0.8" fill="#ffffff" opacity="0.18"/>
      <circle cx="6" cy="5.2" r="0.7" fill="#7d0710" opacity="0.12"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="#18201d"/>
  <rect x="28" y="28" width="1224" height="584" rx="34" fill="url(#paperBg)"/>
  <rect x="28" y="28" width="1224" height="584" rx="34" fill="url(#microGrid)" opacity="0.36"/>
  <rect x="28" y="28" width="1224" height="584" rx="34" fill="url(#dotGrid)" opacity="0.22"/>

  <g transform="translate(88 84)" filter="url(#markShadow)">
    <rect x="0" y="0" width="112" height="112" rx="24" fill="url(#sealRed)"/>
    <rect x="0" y="0" width="112" height="112" rx="24" fill="url(#sealGrain)" opacity="0.44"/>
    <path d="M34 76A35 35 0 0 1 85.3 30.6" fill="none" stroke="#fff7ef" stroke-width="9.8" stroke-linecap="butt"/>
    <path d="M56 45.8h26.5v10.8H66.8v30.1H56V45.8Z" fill="#fff7ef"/>
    <path d="M66.8 86.7 84.9 56.6H73.8L56 86.7h10.8Z" fill="#fff7ef"/>
    <path d="M29.2 86.7h20.4" stroke="#fff7ef" stroke-width="9.8" stroke-linecap="butt"/>
  </g>

  <text x="88" y="244" font-family="Avenir Next, Helvetica Neue, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="800" letter-spacing="2.8" fill="#68736c">DRAWSTAMP STUDIO</text>
  <text x="88" y="309" font-family="Avenir Next, Helvetica Neue, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="54" font-weight="850" letter-spacing="-1.8" fill="#18201d">在线电子印章工作台</text>
  <text x="88" y="365" font-family="Avenir Next, Helvetica Neue, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="650" fill="#3e4a44">生成、提取、编辑、导出，一次完成</text>
  <text x="88" y="414" font-family="Avenir Next, Helvetica Neue, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="600" fill="#68736c">浏览器本地处理 · 透明 PNG / SVG / JPEG · 专业画布</text>

  <g font-family="Avenir Next, Helvetica Neue, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="750">
    <rect x="88" y="464" width="118" height="42" rx="21" fill="#18201d"/>
    <text x="147" y="491" text-anchor="middle" fill="#fffaf1">Canvas</text>
    <rect x="220" y="464" width="146" height="42" rx="21" fill="#fffaf1" stroke="#d6ccbc"/>
    <text x="293" y="491" text-anchor="middle" fill="#3e4a44">本地编辑</text>
    <rect x="380" y="464" width="132" height="42" rx="21" fill="url(#sealRed)"/>
    <text x="446" y="491" text-anchor="middle" fill="#fff7ef">提取印章</text>
  </g>

  <g filter="url(#panelShadow)">
    <rect x="560" y="60" width="660" height="500" rx="28" fill="#fffdf7" stroke="#d9d0c0"/>
    <rect x="584" y="84" width="612" height="452" rx="20" fill="#f8f4ec"/>
    <image href="/readme-workspace.png" x="592" y="88" width="594" height="430" preserveAspectRatio="xMidYMid slice" clip-path="url(#screenClip)" opacity="0.94"/>
    <rect x="592" y="88" width="594" height="430" rx="18" fill="none" stroke="#eee5d6"/>
  </g>

  <g transform="translate(874 430)" filter="url(#panelShadow)">
    <rect x="0" y="0" width="280" height="84" rx="20" fill="#fffaf1" stroke="#d8cebf"/>
    <rect x="24" y="22" width="40" height="40" rx="12" fill="#fff1f1"/>
    <rect x="29" y="27" width="30" height="30" rx="7" fill="#ff0015"/>
    <path d="M37 48.7A11.5 11.5 0 0 1 54.4 34.1" fill="none" stroke="#fff7ef" stroke-width="3.3" stroke-linecap="butt"/>
    <path d="M44 39h8.5v3.6h-5v9.8H44V39Z" fill="#fff7ef"/>
    <path d="M47.5 52.4 53.4 42.6h-3.6L44 52.4h3.5Z" fill="#fff7ef"/>
    <path d="M35.5 52.4h6.5" stroke="#fff7ef" stroke-width="3.3" stroke-linecap="butt"/>
    <text x="82" y="36" font-family="Avenir Next, Helvetica Neue, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="19" font-weight="850" fill="#18201d">图片提取印章</text>
    <text x="82" y="63" font-family="Avenir Next, Helvetica Neue, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="650" fill="#68736c">拖拽上传，保留透明背景</text>
  </g>

  <text x="88" y="563" font-family="Avenir Next, Helvetica Neue, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="800" fill="#ff0015">wosp.cc.cd</text>
  <text x="216" y="563" font-family="Avenir Next, Helvetica Neue, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="650" fill="#68736c">github.com/fisher0627/DrawStamp_Studio</text>
</svg>
